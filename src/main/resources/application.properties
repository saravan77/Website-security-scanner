# Application Configuration
spring.application.name=website-security-analyzer

# Database Connection (H2 In-Memory Default)
spring.datasource.url=jdbc:h2:mem:securitydb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# JPA / Hibernate Configurations
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Thymeleaf Configurations
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Server Port
server.port=8080

# Logging Levels
logging.level.org.springframework=INFO
logging.level.com.securityanalyzer=DEBUG

# Scanning Engine Parameters
scanner.connect-timeout-ms=5000
scanner.socket-timeout-ms=5000
scanner.max-redirects=5
